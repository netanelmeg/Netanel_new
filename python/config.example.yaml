# Number of days ahead to consider a secret "expiring soon".
threshold_days: 30

# Scan all Entra ID (Azure AD) app registration client secrets and certificates.
# Requires the signed-in identity to have Application.Read.All on Microsoft Graph.
app_registrations: true

# Key Vaults to scan (vault names only, not full URLs).
# The signed-in identity needs Get/List on secrets, keys, and certificates.
key_vaults:
  - my-prod-kv
  - my-shared-kv

# Print everything (including healthy items) instead of only items inside the threshold window.
include_ok: false

# Always print a table to stdout.
notify_console: true

# Microsoft Teams Incoming Webhook URL (optional).
# teams_webhook: https://outlook.office.com/webhook/...

# SMTP email notification (optional). Password may also be supplied via SMTP_PASSWORD env var.
# email:
#   smtp_host: smtp.office365.com
#   smtp_port: 587
#   starttls: true
#   username: alerts@contoso.com
#   password: ""
#   from: alerts@contoso.com
#   to:
#     - secops@contoso.com
#   subject: "[Azure] Secret expiration report"
